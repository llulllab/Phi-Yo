<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<!--
  ══════════════════════════════════════════════════════
  Phi-Yo — Chat Interface v2
  ══════════════════════════════════════════════════════
  Aynı patlıcan gecesi paleti, aynı ambient blob'lar,
  aynı tipografi. Tek fark: artık bir sohbet akışı var.
  user_id localStorage'da kalıcı, session_id sayfa
  ömrü boyunca sabit.
  ══════════════════════════════════════════════════════
-->
<link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phi-Yo — Scientific Dream Analysis powered by Freud for Machines</title>
<meta name="description" content="Phi-Yo is an AI-powered dream analysis tool grounded in Freud for Machines: A Computational Psychoanalytic Ontology.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>φ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Instrument+Sans:wght@400;500;600;700&family=Mystery+Quest&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-abyss:#0e0a14;
  --bg-deep:#140f1e;
  --bg-raised:#1c1528;
  --bg-surface:#241c32;
  --bg-input:#2a2038;
  --bg-glow:rgba(30,20,44,0.92);

  --amber:#d4a24c;
  --amber-bright:#e8be6a;
  --amber-dim:#8a6a2e;
  --amber-glow:rgba(212,162,76,0.12);
  --amber-ghost:rgba(212,162,76,0.06);

  --plum:#8a6aaa;
  --plum-dim:rgba(138,106,170,0.12);
  --plum-ghost:rgba(138,106,170,0.06);

  --lavender:#a08cc0;
  --lavender-dim:rgba(160,140,192,0.10);

  --rose:#c47a7a;
  --rose-dim:rgba(196,122,122,0.10);

  --text-1:#e8e0ee;
  --text-2:#9a8eaa;
  --text-3:#8a80a8;
  --text-hero:#f0e8f6;

  --recording:#c47a5a;
  --error:#c46868;
  --success:#6aaa7a;

  --border:rgba(138,106,170,0.12);
  --border-hover:rgba(212,162,76,0.25);

  --font-display:'Fraunces',Georgia,serif;
  --font-mystery:'Mystery Quest',cursive;
  --font-body:'Instrument Sans','Helvetica Neue',sans-serif;

  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;
  --s6:32px;--s7:48px;--s8:64px;--s9:96px;--s10:128px;
  --r2:8px;--r3:12px;--r4:16px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --ease-out:cubic-bezier(0.0,0,0.2,1);
  --ease-bounce:cubic-bezier(0.34,1.56,0.64,1);

  --header-h:52px;
  --composer-h:auto;
}

[data-theme="light"]{
  --bg-abyss:#f6f0e8;
  --bg-deep:#f0e8de;
  --bg-raised:#e8e0d4;
  --bg-surface:#ddd4c6;
  --bg-input:#d4cab8;
  --bg-glow:rgba(240,232,222,0.92);

  --amber:#8a5e1a;
  --amber-bright:#6a4a10;
  --amber-dim:#c4982e;
  --amber-glow:rgba(138,94,26,0.08);
  --amber-ghost:rgba(138,94,26,0.04);

  --plum:#6a4a8a;
  --plum-dim:rgba(106,74,138,0.08);
  --plum-ghost:rgba(106,74,138,0.04);

  --lavender:#5a4a7a;
  --lavender-dim:rgba(90,74,122,0.08);

  --rose:#8a4a4a;
  --rose-dim:rgba(138,74,74,0.08);

  --text-1:#1a1020;
  --text-2:#5a4a6a;
  --text-3:#645878;
  --text-hero:#0e0a14;

  --recording:#7a4a30;
  --error:#8a4040;
  --success:#3a7a4a;

  --border:rgba(106,74,138,0.14);
  --border-hover:rgba(138,94,26,0.30);
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:0.01ms!important;
  }
  html{scroll-behavior:auto}
}

html{font-size:16px;scroll-behavior:smooth;height:100%}

body{
  font-family:var(--font-body);font-weight:400;
  background:var(--bg-abyss);color:var(--text-1);
  line-height:1.6;height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  display:flex;flex-direction:column;
}

::selection{background:rgba(212,162,76,0.25);color:var(--text-hero)}
[data-theme="light"] ::selection{background:rgba(138,94,26,0.20);color:var(--text-hero)}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--plum-dim);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--amber-dim);border-radius:4px}

:focus-visible{outline:2px solid var(--amber);outline-offset:3px}

/* ═══ AMBIENT ═══ */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.phi-blob{
  position:absolute;width:700px;height:700px;top:-10%;right:-15%;
  background:
    radial-gradient(ellipse at 35% 40%,rgba(138,106,170,0.07) 0%,transparent 55%),
    radial-gradient(ellipse at 65% 60%,rgba(212,162,76,0.05) 0%,transparent 50%);
  border-radius:40% 60% 70% 30% / 40% 50% 60% 50%;
  animation:blobMorph 25s ease-in-out infinite;filter:blur(40px);
}
.phi-blob-2{
  position:absolute;width:500px;height:500px;bottom:-15%;left:-10%;
  background:
    radial-gradient(ellipse at 50% 50%,rgba(196,122,122,0.04) 0%,transparent 60%),
    radial-gradient(ellipse at 40% 60%,rgba(138,106,170,0.05) 0%,transparent 50%);
  border-radius:60% 40% 30% 70% / 50% 60% 40% 60%;
  animation:blobMorph 30s ease-in-out infinite reverse;filter:blur(50px);
}
@keyframes blobMorph{
  0%{border-radius:40% 60% 70% 30%/40% 50% 60% 50%;transform:translate(0,0) rotate(0deg)}
  25%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%;transform:translate(20px,-15px) rotate(5deg)}
  50%{border-radius:30% 60% 50% 40%/50% 60% 30% 60%;transform:translate(-10px,20px) rotate(-3deg)}
  75%{border-radius:50% 30% 60% 40%/40% 60% 40% 50%;transform:translate(15px,10px) rotate(4deg)}
  100%{border-radius:40% 60% 70% 30%/40% 50% 60% 50%;transform:translate(0,0) rotate(0deg)}
}
.noise{
  position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.02;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══ HEADER ═══ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--header-h);
  padding:0 var(--s5);
  background:var(--bg-glow);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,162,76,0.2) 30%,rgba(138,106,170,0.15) 70%,transparent);
}
.header-brand{display:flex;align-items:center;gap:var(--s3)}
.header-logo{height:28px;width:auto;object-fit:contain;opacity:0.9}
.header-sep{width:1px;height:16px;background:var(--text-3);opacity:0.3}
.header-name{
  font-family:var(--font-body);font-size:12px;font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--text-2)
}
.header-right{display:flex;align-items:center;gap:var(--s2)}

.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.25s var(--ease),color 0.25s var(--ease),background 0.25s var(--ease);
  min-width:36px;min-height:36px;flex-shrink:0;
}
.icon-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-ghost)}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ═══ CHAT AREA ═══ */
.chat-wrapper{
  position:relative;z-index:1;
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  padding-top:var(--header-h);
}

.chat-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:var(--s5) var(--s4) var(--s4);
  scroll-behavior:smooth;
}

.chat-inner{
  max-width:720px;
  margin:0 auto;
  display:flex;flex-direction:column;
  gap:var(--s4);
}

/* ═══ WELCOME SCREEN ═══ */
.welcome{
  display:flex;flex-direction:column;
  align-items:flex-start;
  padding:var(--s9) 0 var(--s7);
  animation:fadeUp 0.8s var(--ease-out);
}
.welcome.hidden{display:none}
.welcome h1{
  font-family:var(--font-mystery);font-weight:400;
  font-size:clamp(2.8rem,8vw,4.6rem);
  letter-spacing:0.02em;line-height:1.1;
  margin-bottom:var(--s3);overflow:visible;padding-bottom:0.15em;
}
.welcome h1 .phiyo-text{
  display:inline-block;
  background:linear-gradient(115deg,#e2d8f5 0%,#b8a0e0 12%,#9080c8 24%,#c8b0e8 36%,#a090d0 48%,#d8c8f0 60%,#7868b8 72%,#c0b0e0 84%,#e2d8f5 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:phiyoShimmer 6s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(140,120,210,0.35));
}
[data-theme="light"] .welcome h1 .phiyo-text{
  background:linear-gradient(115deg,#3d3060 0%,#6050a0 15%,#4a3880 30%,#7060b0 45%,#3a2870 60%,#8070c0 75%,#5040a0 90%,#3d3060 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(80,60,140,0.2));
  animation:phiyoShimmer 6s ease-in-out infinite;
}
@keyframes phiyoShimmer{0%{background-position:0% 50%}33%{background-position:100% 30%}66%{background-position:50% 100%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.welcome-sub{
  font-family:var(--font-body);font-size:11px;font-weight:600;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--text-3);
  margin-bottom:var(--s4);
}
.welcome-powered{
  font-family:var(--font-display);font-size:15px;font-weight:300;
  font-style:italic;color:var(--text-3);letter-spacing:0.02em;line-height:1.6;
}
.welcome-powered span{
  background:linear-gradient(135deg,var(--lavender),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:400;
}
.welcome-hint{
  margin-top:var(--s7);padding:var(--s4) var(--s5);
  background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r3);
  font-family:var(--font-display);font-size:14px;font-style:italic;font-weight:300;
  color:var(--text-3);line-height:1.7;max-width:480px;
}

/* ═══ CHAT MESSAGES ═══ */
.msg{
  display:flex;flex-direction:column;
  max-width:88%;
  animation:msgIn 0.4s var(--ease-out);
}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.msg-user{align-self:flex-end;align-items:flex-end}
.msg-assistant{align-self:flex-start;align-items:flex-start}

.msg-label{
  font-family:var(--font-body);font-size:10px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:var(--s1);
  padding:0 var(--s3);
}

.msg-bubble{
  padding:var(--s4) var(--s5);
  border-radius:var(--r4);
  line-height:1.75;
  word-wrap:break-word;white-space:pre-wrap;
}

.msg-user .msg-bubble{
  background:linear-gradient(135deg,rgba(212,162,76,0.10),rgba(212,162,76,0.05));
  border:1px solid rgba(212,162,76,0.15);
  font-family:var(--font-body);font-size:14px;color:var(--text-1);
  border-bottom-right-radius:var(--s1);
}

.msg-assistant .msg-bubble{
  background:linear-gradient(160deg,rgba(138,106,170,0.06) 0%,transparent 40%,rgba(212,162,76,0.03) 100%),var(--bg-raised);
  border:1px solid var(--border);
  font-family:var(--font-display);font-size:16px;font-weight:400;color:var(--text-1);
  border-bottom-left-radius:var(--s1);
  position:relative;overflow:hidden;
}
.msg-assistant .msg-bubble::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--amber-dim),var(--plum-dim),transparent);
}

.msg-pills{
  display:flex;flex-wrap:wrap;gap:var(--s1);
  padding:var(--s2) var(--s3) 0;
}
.pill{
  padding:4px 12px;border-radius:20px;
  font-family:var(--font-body);font-size:10px;font-weight:500;
  letter-spacing:0.03em;
  transition:transform 0.2s var(--ease);
}
.pill:hover{transform:translateY(-1px)}
.pill-symbol{color:var(--amber);border:1px solid rgba(212,162,76,0.25);background:var(--amber-ghost)}
.pill-emotion{color:var(--plum);border:1px solid rgba(138,106,170,0.25);background:var(--plum-ghost)}
.pill-theme{color:var(--lavender);border:1px solid rgba(160,140,192,0.25);background:var(--lavender-dim)}

/* ═══ TYPING INDICATOR ═══ */
.typing{
  align-self:flex-start;
  padding:var(--s4) var(--s5);
  animation:msgIn 0.3s var(--ease-out);
}
.typing-dots{display:flex;gap:6px;align-items:center}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--plum);opacity:0.4;
  animation:typeDot 1.4s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes typeDot{0%,60%,100%{opacity:0.3;transform:scale(1)}30%{opacity:0.8;transform:scale(1.2)}}

.typing-label{
  font-family:var(--font-display);font-size:13px;font-style:italic;
  font-weight:300;color:var(--text-3);margin-top:var(--s2);
}

/* ═══ COMPOSER ═══ */
.composer{
  position:relative;z-index:10;
  flex-shrink:0;
  background:var(--bg-glow);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:var(--s3) var(--s4);
}
.composer::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,162,76,0.15) 30%,rgba(138,106,170,0.1) 70%,transparent);
}

.composer-inner{
  max-width:720px;margin:0 auto;
  display:flex;flex-direction:column;gap:var(--s2);
}

.composer-row{
  display:flex;align-items:flex-end;gap:var(--s2);
}

.composer-input{
  flex:1;
  min-height:44px;max-height:160px;
  background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r3);
  padding:var(--s3) var(--s4);
  font-family:var(--font-body);font-size:14px;font-weight:400;
  line-height:1.6;color:var(--text-1);resize:none;outline:none;
  transition:border-color 0.25s var(--ease),box-shadow 0.25s var(--ease);
  overflow-y:auto;
}
.composer-input::placeholder{font-family:var(--font-display);font-style:italic;color:var(--text-3);font-size:14px}
.composer-input:focus{border-color:var(--amber-dim);box-shadow:0 0 0 3px var(--amber-ghost)}

.composer-actions{display:flex;gap:var(--s2);align-items:flex-end}

.send-btn{
  width:44px;height:44px;border-radius:var(--r2);
  border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--amber-dim),var(--amber));
  color:var(--bg-abyss);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s var(--ease),box-shadow 0.25s var(--ease),opacity 0.2s var(--ease);
  flex-shrink:0;
}
.send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,162,76,0.3)}
.send-btn:active:not(:disabled){transform:translateY(0)}
.send-btn:disabled{opacity:0.25;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.mic-btn{
  width:44px;height:44px;border-radius:var(--r2);
  border:1px solid var(--border);background:transparent;
  color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.25s var(--ease),color 0.25s var(--ease),background 0.25s var(--ease);
  flex-shrink:0;position:relative;
}
.mic-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-ghost)}
.mic-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.mic-btn.recording{border-color:rgba(196,122,90,0.5);background:rgba(196,122,90,0.10);color:var(--recording)}
.mic-btn.recording::after{
  content:'';position:absolute;inset:-4px;border-radius:var(--r3);
  border:1px solid rgba(196,122,90,0.2);
  animation:micPulse 2s ease-in-out infinite;
}
@keyframes micPulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}

.composer-meta{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--s1);
}
.composer-meta-left{display:flex;align-items:center;gap:var(--s3)}

.lang-select{
  background:none;border:none;
  font-family:var(--font-body);font-size:11px;font-weight:500;
  color:var(--text-3);cursor:pointer;
  padding:2px 4px;
}
.lang-select option{background:var(--bg-raised);color:var(--text-1)}

.rec-indicator{
  display:none;align-items:center;gap:var(--s2);
  font-family:var(--font-body);font-size:11px;font-weight:500;color:var(--recording);
}
.rec-indicator.visible{display:flex}
.rec-dot{
  width:6px;height:6px;border-radius:50%;background:var(--recording);
  animation:recBlink 1s ease-in-out infinite;
}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:0.3}}

.session-info{
  font-family:var(--font-body);font-size:10px;color:var(--text-3);opacity:0.5;
  letter-spacing:0.05em;
}

/* ═══ ERROR BAR ═══ */
.error-toast{
  position:fixed;top:calc(var(--header-h) + var(--s3));
  left:50%;transform:translateX(-50%);z-index:200;
  padding:var(--s3) var(--s5);
  background:var(--rose-dim);border:1px solid rgba(196,122,122,0.25);
  border-radius:var(--r2);font-size:13px;color:var(--error);
  backdrop-filter:blur(12px);
  opacity:0;pointer-events:none;
  transition:opacity 0.3s var(--ease),transform 0.3s var(--ease);
}
.error-toast.visible{opacity:1;pointer-events:auto}

/* ═══ FOOTER ═══ */
.footer-inline{
  text-align:center;padding:var(--s7) 0 var(--s4);
  font-family:var(--font-body);font-size:10px;letter-spacing:0.1em;
  color:var(--text-3);opacity:0.25;
}
.footer-inline a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(90,74,112,0.3)}
.footer-inline a:hover{border-color:var(--amber)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:600px){
  .welcome h1{font-size:clamp(2.2rem,10vw,3.4rem)}
  .msg{max-width:92%}
  .msg-assistant .msg-bubble{font-size:15px}
  .chat-scroll{padding:var(--s4) var(--s3) var(--s3)}
}
@media(min-width:768px){
  .chat-scroll{padding:var(--s6) var(--s6) var(--s4)}
  .composer{padding:var(--s4) var(--s6)}
}
</style>
</head>
<body>
<div class="ambient" aria-hidden="true"><div class="phi-blob"></div><div class="phi-blob-2"></div></div>
<div class="noise" aria-hidden="true"></div>

<header class="header" role="banner">
  <div class="header-brand">
    <img src="logo.jpg" alt="Phi-Yo logo" class="header-logo" width="28" height="28">
    <span class="header-sep" aria-hidden="true"></span>
    <span class="header-name">Phi-Yo</span>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="newSessionBtn" aria-label="Start new session" title="New session">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="icon-btn" id="themeToggle" aria-label="Switch to light mode">
      <svg id="themeIcon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</header>

<div class="chat-wrapper">
  <div class="chat-scroll" id="chatScroll">
    <div class="chat-inner" id="chatInner">

      <div class="welcome" id="welcomeScreen">
        <h1><span class="phiyo-text">PHI-YO</span></h1>
        <p class="welcome-sub">Scientific Dream Analysis</p>
        <p class="welcome-powered">powered by <span>Freud for Machines: A Computational Psychoanalytic Ontology</span></p>
        <div class="welcome-hint">
          Describe your dream by voice or text. You can ask follow-up questions about the interpretation, and I will remember our conversation throughout this session.
        </div>
      </div>

      <div class="footer-inline" id="footerInline">
        &copy; 2026 <a href="https://llulllab.com" target="_blank" rel="noopener">Llull Lab</a>
      </div>
    </div>
  </div>

  <div class="composer" id="composer">
    <div class="composer-inner">
      <div class="composer-row">
        <textarea class="composer-input" id="composerInput" placeholder="Describe your dream or ask a question..." rows="1" aria-label="Message input"></textarea>
        <div class="composer-actions">
          <button class="mic-btn" id="micBtn" aria-label="Voice input">
            <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          </button>
          <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="composer-meta">
        <div class="composer-meta-left">
          <select class="lang-select" id="langSelect" aria-label="Speech language">
            <option value="fr-FR">FR</option>
            <option value="en-US">EN</option>
            <option value="tr-TR">TR</option>
            <option value="de-DE">DE</option>
            <option value="es-ES">ES</option>
            <option value="ja-JP">JA</option>
            <option value="ru-RU">RU</option>
            <option value="ar-SA">AR</option>
          </select>
          <div class="rec-indicator" id="recIndicator">
            <span class="rec-dot"></span>
            <span id="recTimer">00:00</span>
          </div>
        </div>
        <span class="session-info" id="sessionInfo"></span>
      </div>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast" role="alert" aria-live="assertive"></div>

<script>
(function(){
  'use strict';

  var WEBHOOK_URL = 'https://n8n.tropus.io/webhook/phiyo-dream';

  /* ══ Identity — kalıcı user_id, sayfa-ömürlü session_id ══ */
  function generateId(){
    if(typeof crypto!=='undefined'&&crypto.randomUUID) return crypto.randomUUID();
    return 'xxxx-xxxx-xxxx'.replace(/x/g,function(){return(Math.random()*16|0).toString(16)});
  }

  var userId;
  try{
    userId=localStorage.getItem('phiyo-user-id');
    if(!userId){userId='phiyo-'+generateId();localStorage.setItem('phiyo-user-id',userId);}
  }catch(e){userId='phiyo-'+generateId();}

  var sessionId='session-'+generateId();
  var messageCount=0;

  /* ══ DOM refs ══ */
  var chatScroll=document.getElementById('chatScroll');
  var chatInner=document.getElementById('chatInner');
  var welcomeScreen=document.getElementById('welcomeScreen');
  var footerInline=document.getElementById('footerInline');
  var composerInput=document.getElementById('composerInput');
  var sendBtn=document.getElementById('sendBtn');
  var micBtn=document.getElementById('micBtn');
  var errorToast=document.getElementById('errorToast');
  var sessionInfo=document.getElementById('sessionInfo');
  var recIndicator=document.getElementById('recIndicator');
  var recTimerEl=document.getElementById('recTimer');

  sessionInfo.textContent=sessionId.slice(0,20)+'…';

  /* ══ Theme ══ */
  var MOON='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  var SUN='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  var themeToggle=document.getElementById('themeToggle');
  var themeIcon=document.getElementById('themeIcon');
  var currentTheme;
  try{currentTheme=localStorage.getItem('phiyo-theme')||'dark';}catch(e){currentTheme='dark';}

  function applyTheme(t){
    currentTheme=t;document.documentElement.setAttribute('data-theme',t);
    try{localStorage.setItem('phiyo-theme',t);}catch(e){}
    themeIcon.innerHTML=t==='dark'?MOON:SUN;
    themeToggle.setAttribute('aria-label','Switch to '+(t==='dark'?'light':'dark')+' mode');
  }
  themeToggle.addEventListener('click',function(){applyTheme(currentTheme==='dark'?'light':'dark');});
  applyTheme(currentTheme);

  /* ══ New session ══ */
  document.getElementById('newSessionBtn').addEventListener('click',function(){
    if(messageCount>0&&!confirm('Start a new session? Current conversation will be preserved in your history.')) return;
    sessionId='session-'+generateId();
    messageCount=0;
    sessionInfo.textContent=sessionId.slice(0,20)+'…';
    // Clear chat but keep welcome
    var msgs=chatInner.querySelectorAll('.msg,.typing');
    msgs.forEach(function(m){m.remove();});
    welcomeScreen.classList.remove('hidden');
    footerInline.style.display='';
  });

  /* ══ Auto-resize textarea ══ */
  composerInput.addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,160)+'px';
    sendBtn.disabled=!this.value.trim()&&!isRecording;
  });

  composerInput.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}
  });

  sendBtn.addEventListener('click',doSend);

  /* ══ Voice ══ */
  var isRecording=false,recognition=null,voiceText='',recSeconds=0,recInterval=null;

  micBtn.addEventListener('click',function(){isRecording?stopRec():startRec();});

  function startRec(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showError('Speech recognition not supported. Use Chrome or Edge.');return;}
    recognition=new SR();
    recognition.continuous=true;recognition.interimResults=true;recognition.maxAlternatives=1;
    recognition.lang=document.getElementById('langSelect').value;
    voiceText='';var interim='';
    recognition.onresult=function(e){
      interim='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) voiceText+=e.results[i][0].transcript+' ';
        else interim+=e.results[i][0].transcript;
      }
      composerInput.value=voiceText+interim;
      composerInput.dispatchEvent(new Event('input'));
    };
    recognition.onerror=function(e){if(e.error!=='no-speech')stopRec();};
    recognition.onend=function(){if(isRecording)try{recognition.start();}catch(x){}};
    try{
      recognition.start();
      isRecording=true;recSeconds=0;
      micBtn.classList.add('recording');
      recIndicator.classList.add('visible');
      recTimerEl.textContent='00:00';
      recInterval=setInterval(function(){
        recSeconds++;
        recTimerEl.textContent=String(Math.floor(recSeconds/60)).padStart(2,'0')+':'+String(recSeconds%60).padStart(2,'0');
      },1000);
      sendBtn.disabled=false;
    }catch(e){showError('Could not start recording.');}
  }

  function stopRec(){
    isRecording=false;
    if(recognition){recognition.stop();recognition=null;}
    if(recInterval){clearInterval(recInterval);recInterval=null;}
    micBtn.classList.remove('recording');
    recIndicator.classList.remove('visible');
  }

  /* ══ Send message ══ */
  var isSending=false;

  function doSend(){
    if(isSending) return;
    if(isRecording) stopRec();
    var text=(composerInput.value||'').trim();
    if(!text) return;

    // Hide welcome
    welcomeScreen.classList.add('hidden');
    footerInline.style.display='none';

    // Add user message
    addMessage('user',text);
    composerInput.value='';composerInput.style.height='auto';
    sendBtn.disabled=true;
    messageCount++;

    // Show typing
    var typingEl=addTyping();
    scrollToBottom();

    isSending=true;
    var inputType=voiceText?'voice':'text';
    voiceText='';

    fetch(WEBHOOK_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        dream:text,
        user_id:userId,
        session_id:sessionId,
        input_type:inputType,
        language:document.getElementById('langSelect').value
      })
    })
    .then(function(r){if(!r.ok)throw new Error('Server error: '+r.status);return r.json();})
    .then(function(data){
      removeTyping(typingEl);
      var reply=data.interpretation||data.displayResponse||'No response received.';
      var meta=data.metadata||{};
      addMessage('assistant',reply,meta);
      scrollToBottom();
    })
    .catch(function(e){
      removeTyping(typingEl);
      showError('Connection error: '+e.message);
    })
    .finally(function(){isSending=false;sendBtn.disabled=!composerInput.value.trim();});
  }

  /* ══ Chat DOM helpers ══ */
  function addMessage(role,text,meta){
    var wrap=document.createElement('div');
    wrap.className='msg msg-'+role;

    var label=document.createElement('div');
    label.className='msg-label';
    label.textContent=role==='user'?'You':'Phi-Yo';
    wrap.appendChild(label);

    var bubble=document.createElement('div');
    bubble.className='msg-bubble';
    bubble.textContent=text;
    wrap.appendChild(bubble);

    if(meta&&role==='assistant'){
      var pills=document.createElement('div');
      pills.className='msg-pills';
      var hasPills=false;
      ['symbols','emotions','themes'].forEach(function(key){
        var cls=key==='symbols'?'pill-symbol':key==='emotions'?'pill-emotion':'pill-theme';
        (meta[key]||[]).forEach(function(s){
          hasPills=true;
          var p=document.createElement('span');
          p.className='pill '+cls;p.textContent=s;
          pills.appendChild(p);
        });
      });
      if(hasPills) wrap.appendChild(pills);
    }

    // Insert before footer
    chatInner.insertBefore(wrap,footerInline);
    return wrap;
  }

  function addTyping(){
    var el=document.createElement('div');
    el.className='typing';
    el.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div><div class="typing-label">Phi-Yo is thinking\u2026</div>';
    chatInner.insertBefore(el,footerInline);
    return el;
  }

  function removeTyping(el){if(el&&el.parentNode)el.parentNode.removeChild(el);}

  function scrollToBottom(){
    requestAnimationFrame(function(){
      chatScroll.scrollTop=chatScroll.scrollHeight;
    });
  }

  /* ══ Error toast ══ */
  var errTimer=null;
  function showError(m){
    errorToast.textContent=m;errorToast.classList.add('visible');
    clearTimeout(errTimer);errTimer=setTimeout(function(){errorToast.classList.remove('visible');},5000);
  }

  /* ══ Focus input on load ══ */
  setTimeout(function(){composerInput.focus();},500);

})();
</script>
</body>
</html>
